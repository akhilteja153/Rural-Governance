<!DOCTYPE html>
<html>
<head>
<title>Complaints</title>

<!-- ✅ Responsive viewport (ADDED) -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira:wght@100..900&display=swap" rel="stylesheet">

<style>
:root{
  --blue:#0a6cff;
  --black:#0f172a;
  --white:#ffffff;
  --bg:#f4f6fb;
  --green:#16a34a;
  --red:#dc2626;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Saira',sans-serif;
}

body{
  background:var(--bg);
}

/* ================= NAVBAR ================= */

.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  /* padding:25px 40px; */
  padding: 12px 40px;
  background:#ffffff;
  box-shadow:0 1px 4px rgba(0,0,0,0.1);
  position:relative;
}

.logo{
  font-weight:bold;
  
}

.nav-links{
  list-style:none;
  display:flex;
  gap:24px;

}

.nav-links a{
  text-decoration:none;
  color:#333;
  font-size:14px;
}

/* Hamburger button (ADDED ONLY) */
.nav-toggle{
  display:none;
  background:none;
  border:0;
  cursor:pointer;
   padding:8px; 
}

.nav-toggle .bar{
  display:block;
  width:22px;
  height:2px;
  margin:4px 0;
  background:#333;
}

/* ================= MAIN ================= */

.main{
  padding:30px;
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  gap:15px;
  margin-bottom:25px;
}

.back-btn{
  background:var(--blue);
  color:#ffffff !important;
  padding:6px 12px;
  border-radius:6px;
  text-decoration:none;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  margin-bottom:25px;
}

.card{
  background:#fff;
  padding:20px;
  border-radius:14px;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.card p{
  font-size:28px;
  font-weight:bold;
  color:var(--blue);
}

/* CONTROLS */
.controls{
  display:flex;
  gap:15px;
  margin-bottom:15px;
  flex-wrap:wrap; /* responsive */
}

.controls input,
.controls select{
  padding:10px;
  border-radius:8px;
  border:1px solid #d1d5db;
  font-size:14px;
}

/* TABLE */
.table-container{
  background:#fff;
  padding:20px;
  border-radius:14px;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
  overflow-x:auto; /* mobile scroll */
}

table{
  width:100%;
  border-collapse:collapse;
  min-width:700px;
}

th,td{
  padding:14px;
  border-bottom:1px solid #e5e7eb;
}

th{background:#f1f5f9;}

.status{
  padding:4px 10px;
  border-radius:20px;
  font-size:13px;
  font-weight:600;
}

.pending{background:#fee2e2;color:var(--red);}
.resolved{background:#dcfce7;color:var(--green);}

.view-btn{
  background:var(--blue);
  color:#ffffff;
  padding:6px 10px;
  border-radius:6px;
  font-size:14px;
}

a{
  text-decoration:none;
  color:white;
}

/* ================= MOBILE RESPONSIVE (ADDED ONLY) ================= */

@media (max-width:768px){

  .main{
    padding:20px 15px;
  }

  .top-bar{
    padding:14px 16px;
  }

  .nav-toggle{
    display:block;
  }

  .nav-links{
    display:none;
    position:absolute;
    top:70px;
    right:16px;
    flex-direction:column;
    background:#fff;
    padding:12px;
    border-radius:10px;
    box-shadow:0 8px 24px rgba(0,0,0,0.15);
    min-width:180px;
  }

  .nav-links li{
    padding:8px 0;
  }

  .nav-links.active{
    display:flex;
  }

  .header h1{
    font-size:20px;
  }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
<div class="top-bar">

<div class="logo">
<img src="/Best one(1)/admin_dashboard/logo.html.jpeg" width="50px">
</div>

<!-- Hamburger (added) -->
<button class="nav-toggle">
<span class="bar"></span>
<span class="bar"></span>
<span class="bar"></span>
</button>

<ul class="nav-links">
<li><a href="/Best one(1)/admin_dashboard/officer_home.html"><i class="fa-regular fa-house"></i>Home</a></li>
<li><a href="complaints.html"><i class="fa-solid fa-file"></i>Complaints</a></li>
<li><a href="workers.html"><i class="fa-solid fa-person-digging"></i>Workers</a></li>
<li><a href="warrdstats.html"><i class="fa-solid fa-chart-column"></i>Ward stats</a></li>
<li><a href="reports.html"><i class="fa-solid fa-flag"></i>Reports</a></li>
<li><a href="profile.html"><i class="fa-regular fa-address-card"></i>Profile</a></li>
</ul>

</div>
</nav>

<div class="main">

<div class="header">
<a href="departments.html" class="back-btn"><i class="fa fa-arrow-left"></i></a>
<h1>Electricity Department</h1>
</div>

<!-- SUMMARY -->
<div class="cards">
<div class="card"><h4>Total Complaints</h4><p>40</p></div>
<div class="card"><h4>Pending</h4><p>22</p></div>
<div class="card"><h4>Resolved</h4><p>18</p></div>
</div>

<!-- SEARCH + FILTER -->
<div class="controls">
<input type="text" id="searchInput" placeholder="Search complaints...">
<select id="statusFilter">
<option value="all">All</option>
<option value="pending">Pending</option>
<option value="resolved">Resolved</option>
</select>
</div>

<!-- TABLE (UNCHANGED CONTENT) -->
<div class="table-container">
<table id="complaintsTable">
<thead>
<tr>
<th>ID</th><th>Citizen</th><th>Issue</th><th>Date</th><th>Status</th><th>Action</th>
</tr>
</thead>
<tbody>

<tr><td>ED-001</td><td>Rahul Sharma</td><td>Power outage since morning</td><td>01-01-2026</td><td class="pending">Pending</td><td><button class="view-btn"><a href="./complaint2.html">View</a></button></td></tr>
<tr><td>ED-002</td><td>Anita Verma</td><td>Frequent power cuts</td><td>01-01-2026</td><td class="resolved">Resolved</td><td><button class="view-btn"><a href="./complaint2.html">view</a></button></td></tr>

<!-- (All your remaining rows stay SAME — no change needed) -->

</tbody>
</table>
</div>

</div>

<script>
const searchInput=document.getElementById("searchInput");
const statusFilter=document.getElementById("statusFilter");
const rows=document.querySelectorAll("#complaintsTable tbody tr");

function filterTable(){
const searchText=searchInput.value.toLowerCase();
const statusValue=statusFilter.value;

rows.forEach(row=>{
const text=row.innerText.toLowerCase();
const status=row.querySelector("td:nth-child(5)").innerText.toLowerCase();

row.style.display=
text.includes(searchText)&&
(statusValue==="all"||status===statusValue)
?"" :"none";
});
}

searchInput.addEventListener("keyup",filterTable);
statusFilter.addEventListener("change",filterTable);

/* ✅ Mobile navbar toggle */
document.querySelector('.nav-toggle')
.addEventListener('click',function(){
document.querySelector('.nav-links')
.classList.toggle('active');
});
</script>

</body>
</html>
